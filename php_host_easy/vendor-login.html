<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Portal — Magenta Investments LLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <div class="auth-page" style="background: linear-gradient(135deg, #0f172a 0%, #134e4a 100%);">
    <div class="auth-card">
      <div class="auth-header" style="background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);">
        <div style="font-size:2.5rem;margin-bottom:.75rem">🏪</div>
        <h1>Vendor Portal</h1>
        <p>Sign in to submit and manage your quotes</p>
      </div>
      <div class="auth-body">
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <form id="vendor-login-form">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="vendor@magenta-investments.com" required autofocus />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required />
          </div>
          <button type="submit" id="login-btn" class="btn btn-primary w-full" style="justify-content:center;background:#0d9488;">
            Sign In →
          </button>
        </form>
        <p style="text-align:center;font-size:.85rem;color:var(--gray-500);margin-top:1.25rem">
          Not registered? <a href="vendor-register.html" style="color:#0d9488;font-weight:600">Register your company</a>
        </p>
        <p style="text-align:center;font-size:.8rem;color:var(--gray-400);margin-top:.75rem">
          <a href="portal.html" style="color:var(--gray-400)">← Back to staff login</a>
        </p>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    // Check already logged in
    if (localStorage.getItem('vendorToken')) {
      window.location.href = 'vendor-portal.html';
    }

    document.getElementById('vendor-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        // Using the vendors.php login endpoint
        const data = await api.post('/vendors?action=login', { email, password });
        localStorage.setItem('vendorToken', data.token);
        localStorage.setItem('vendor', JSON.stringify(data.vendor));
        window.location.href = 'vendor-portal.html';
      } catch (err) {
        errEl.textContent = err.data?.error || 'Login failed. Check your credentials.';
        errEl.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    });
  </script>
</body>
</html>
